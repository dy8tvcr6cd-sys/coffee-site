<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finca Deborah Vivid Geisha</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f7f8;
  color: #111;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 28px 22px 100px;
}

h1 {
  font-size: 26px;
  line-height: 1.4;
  margin: 0;
}

.subtitle {
  margin-top: 10px;
  color: #666;
  font-size: 14px;
}

.card {
  background: white;
  border-radius: 22px;
  padding: 20px;
  margin-top: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.button {
  display: block;
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  margin-top: 10px;
  text-decoration: none;
  text-align: center;
}

.primary {
  background: #111;
  color: white;
}

.secondary {
  background: #eee;
  color: #111;
}

.note-list {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.note {
  background: #f1f1f3;
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 13px;
}

.small {
  font-size: 13px;
  color: #888;
  margin-top: 10px;
}

/* 하단 고정 */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 480px;
  background: white;
  padding: 12px;
  border-top: 1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

  <h1>지금 커피,<br>괜찮게 나오고 있나요?</h1>

  <div class="subtitle">
    Panama Finca Deborah Vivid Geisha
  </div>

  <!-- 상태 선택 -->
  <div class="card">
    <a href="brew.html" class="button primary">👍 괜찮다 → 유지하기</a>
    <a href="fix.html" class="button secondary">😕 뭔가 이상하다 → 해결하기</a>
  </div>

  <!-- 핵심 가이드 -->
  <div class="card">
    <div style="font-size:13px;color:#888;">핵심 가이드</div>
    <div style="margin-top:6px;font-weight:700;">
      이 원두는 과하게 오래 두면 쓴맛이 올라옵니다
    </div>
    <div class="small">
      짧고 깔끔하게 끝내는 것이 중요합니다
    </div>
  </div>

  <!-- 컵노트 (행동 연결) -->
  <div class="card">
    <div style="font-size:13px;color:#888;">컵노트</div>

    <div class="note-list">
      <div class="note">재스민 → 온도 낮추면 더 선명</div>
      <div class="note">베르가못 → 짧게 추출</div>
      <div class="note">홍차 → 길어지면 무거워짐</div>
    </div>
  </div>

  <!-- 정보 접근 -->
  <div class="card">
    <a href="info.html" class="button secondary">원두 정보 보기</a>
  </div>

</div>

<!-- 하단 고정 구매 -->
<div class="footer">
  <a href="buy.html" class="button primary">구매하기</a>
</div>

</body>
</html>
