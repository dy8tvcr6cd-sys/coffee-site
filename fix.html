<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문제 해결</title>

<style>
body{font-family:-apple-system;margin:0;padding:24px;}
button{width:100%;padding:16px;margin-top:12px;background:#000;color:#fff;border:none;border-radius:12px;}
.card{background:#f5f5f7;padding:16px;border-radius:14px;margin-top:12px;}
</style>
</head>

<body>

<h2>맛이 이상하다면</h2>

<button onclick="show('bitter')">너무 쓰다</button>
<button onclick="show('weak')">너무 연하다</button>

<div id="bitter" class="card" style="display:none;">
물 온도를 낮추고 추출 시간을 줄이세요
</div>

<div id="weak" class="card" style="display:none;">
원두 양을 늘리고 분쇄도를 가늘게 조정하세요
</div>

<button onclick="history.back()">뒤로</button>

<script>
function show(id){
 document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
