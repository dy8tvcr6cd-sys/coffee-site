<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:-apple-system;padding:24px;background:#f7f7f8;}
button{
 width:100%;
 padding:16px;
 margin-top:10px;
 border-radius:14px;
 border:none;
 background:white;
 box-shadow:0 5px 15px rgba(0,0,0,0.05);
 font-weight:600;
}
.result{
 margin-top:14px;
 background:#111;
 color:white;
 padding:16px;
 border-radius:16px;
 line-height:1.6;
}
</style>
</head>

<body>

<h2>어떤 문제가 있나요?</h2>

<button onclick="show('bitter')">쓴맛이 강하다</button>
<button onclick="show('weak')">너무 연하다</button>
<button onclick="show('sour')">산미가 날카롭다</button>

<div id="result" class="result" style="display:none;"></div>

<script>
function show(type){
  let text = '';

  if(type==='bitter'){
    text = '추출이 길어졌습니다. 물 온도를 낮추고 추출 시간을 줄이세요.';
  }
  if(type==='weak'){
    text = '추출이 부족합니다. 분쇄도를 더 가늘게 하거나 원두를 늘리세요.';
  }
  if(type==='sour'){
    text = '온도가 낮거나 추출이 부족합니다. 물 온도를 올려보세요.';
  }

  document.getElementById('result').innerText = text;
  document.getElementById('result').style.display = 'block';
}
</script>
 <a href="index.html" class="button secondary">← 처음으로</a>
</body>
</html>
